<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
            margin: 0;
        }

        canvas {
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 4,
            dx: 4,
            dy: 4,
        };

        const paddleWidth = 10;
        const paddleHeight = 100;

        const player = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "white",
            score: 0,
        };

        const ai = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: "red",
            score: 0,
        };

        function drawBall() {
            context.fillStyle = "white";
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            context.closePath();
            context.fill();
        }

        function drawPaddle(x, y, width, height, color) {
            context.fillStyle = color;
            context.fillRect(x, y, width, height);
        }

        function drawScore() {
            context.fillStyle = "white";
            context.font = "35px Arial";
            context.fillText(player.score, canvas.width / 4, canvas.height / 5);
            context.fillText(ai.score, 3 * canvas.width / 4, canvas.height / 5);
        }

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // Ball collision with paddles
            if (ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height) {
                ball.dx *= -1;
            } else if (ball.x + ball.radius > ai.x &&
                       ball.y > ai.y &&
                       ball.y < ai.y + ai.height) {
                ball.dx *= -1;
            }

            // Update AI paddle position
            ai.y += ((ball.y - (ai.y + ai.height / 2)) * 0.1);

            // Scoring
            if (ball.x + ball.radius > canvas.width) {
                player.score++;  
                resetBall();
            } else if (ball.x - ball.radius < 0) {
                ai.score++;  
                resetBall();
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = 4 * (Math.random() > 0.5 ? 1 : -1);
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            drawPaddle(player.x, player.y, player.width, player.height, player.color);
            drawPaddle(ai.x, ai.y, ai.width, ai.height, ai.color);
            drawScore();
        }

        function game() {
            update();
            draw();
            requestAnimationFrame(game);
        }

        document.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            player.y = event.clientY - rect.top - player.height / 2;
            player.y = Math.max(Math.min(player.y, canvas.height - player.height), 0);
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') {
                player.y -= 20;
            } else if (event.key === 'ArrowDown') {
                player.y += 20;
            }
            player.y = Math.max(Math.min(player.y, canvas.height - player.height), 0);
        });

        game();
    </script>
</body>
</html>
